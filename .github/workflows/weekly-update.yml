name: Weekly PPVFRA update

# Scrape -> clean -> figures -> commit data -> render Quarto dashboard -> publish to Pages.

on:
  schedule:
    - cron: "0 6 * * 0"      # every Sunday at 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:                    # rebuild the site when the dashboard or code changes
      - "*.qmd"
      - "_quarto.yml"
      - "**/*.R"
      - ".github/workflows/weekly-update.yml"

permissions:
  contents: write             # commit refreshed data
  pages: write                # publish to GitHub Pages
  id-token: write             # required by deploy-pages

# allow one publish at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rvest
            any::httr
            any::dplyr
            any::readr
            any::janitor
            any::purrr
            any::stringr
            any::tidyr
            any::ggplot2
            any::forcats
            any::scales
            any::lubridate
            any::plotly
            any::htmlwidgets
            any::knitr
            any::rmarkdown

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Scrape, clean, and build figures
        run: |
          Rscript R/scrape_all_certificates.R
          Rscript R/clean_pvp_certificates.R
          Rscript R/analyze_pvp_certificates.R

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pvp_certificates_all.csv data/pvp_certificates_clean.csv
          if git diff --cached --quiet; then
            echo "No data changes this week — nothing to commit."
          else
            date -u +"Last updated: %Y-%m-%d %H:%M UTC" > data/last_updated.txt
            git add data/last_updated.txt
            git commit -m "Weekly PPVFRA refresh ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Render Quarto dashboard
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
